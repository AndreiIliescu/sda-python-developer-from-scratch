<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="form_validation_style.css" />
    <title>Forms validation</title>
  </head>
  <body>
    <h1>Forms validation</h1>
    <form action="#">
      <p>
        <label for="username">User name: </label
        ><input type="text" id="username" name="username" />
        <span class="errorMsg"></span>
      </p>
      <p>
        <label for="password">Password: </label
        ><input type="password" id="password" name="password" />
        <span class="errorMsg"></span>
      </p>
      <p>
        <label for="email">Email: </label
        ><input type="text" id="email" name="email" />
        <span class="errorMsg"></span>
      </p>
      <p>
        <label for="age">Age: </label
        ><input type="number" id="age" name="age" />
        <span class="errorMsg"></span>
      </p>
      <p>
        <label for="activationDate">System activation date: </label
        ><input type="date" id="activationDate" name="activationDate" />
        <span class="errorMsg"></span>
      </p>
      <p>
        <button type="submit" onclick="validateForm()">Send</button>
      </p>
      <p id="form-result" style="display: none"></p>
    </form>
    <script type="text/javascript" src="form_validation_code.js"></script>
  </body>
</html>
